name: ci-web
on:
  pull_request:
    paths: ["web/**", ".github/workflows/ci-web.yml"]
  push:
    branches: [main]
    paths: ["web/**"]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
      - run: npm run lint
      - run: npm run build